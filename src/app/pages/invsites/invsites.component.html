<div class="items-container">
  <!-- Overlay for Mobile Sidebar -->
  <!-- <div class="sidebar-overlay" [class.active]="isMobileSidebarOpen" (click)="closeMobileSidebar()"></div> -->

  <!-- Left Sidebar - SITES -->
  <div class="sidebar" [class.open]="isMobileSidebarOpen">
    <div class="sidebar-header">
      <div class="section-header">
        <h2 class="text-header-lg">SITES</h2>
      </div>
    </div>

    <div class="sidebar-search">
      <div class="input-container">
        <input type="text" placeholder="Search here" class="search-input font-Neometric-Medium" [(ngModel)]="searchText"
          (ngModelChange)="onSearchChange()" />
      </div>
    </div>

    <!-- Sites List -->
    <div class="sites-list">
      <div *ngFor="let site of filteredSites" class="site-item font-Neometric-Medium"
        [class.active]="selectedSite === site.name" (click)="selectSite(site.name)">
        <img [src]="selectedSite === site.name ? 'assets/headericons/sites-icon-active.svg' : 'assets/headericons/sites-icon.svg'"
          alt="Site" class="site-icon" />
        <span>{{ site.name }}</span>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">
    <!-- Overlay for Mobile Sidebar -->
    <div class="sidebar-overlay" [class.active]="isMobileSidebarOpen" (click)="closeMobileSidebar()"></div>

    <!-- Header -->
    <div class="content-header">
      <div class="header-left">
        <!-- Mobile Toggle Button (Using text or existing icon if SVG missing) -->
        <button class="mobile-menu-btn" (click)="toggleMobileSidebar()">
          <!-- Using SVG for hamburger menu to avoid 404 -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="menu-icon">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
          </svg>
        </button>

        <div class="header-title">
          <h2 class="font-Neometric-Medium">DETAILED VIEW</h2>
          <div class="view-toggle-indicator" [class.active]="viewMode === 'detailed'" (click)="toggleViewMode()"
            title="Toggle view mode"></div>
        </div>
      </div>

      <button class="filter-toggle-btn" (click)="toggleFilterPanel()">
        <img src="assets/filter-icon.png" alt="Filter" class="filter-toggle-icon" />
      </button>
    </div>

    <!-- Content Area - Single View -->
    <div class="content-area">
      <!-- List View Table -->
      <app-invsites-list-view *ngIf="viewMode === 'list'" [tableData]="filteredNormalData"
        (viewDetails)="handleViewDetails($event)">
      </app-invsites-list-view>

      <!-- Detailed View -->
      <app-invsites-detailed-view *ngIf="viewMode === 'detailed'" [tableData]="detailedTableData">
      </app-invsites-detailed-view>
    </div>
  </div>
</div>

<!-- Filter Panel -->
<app-unified-filter-panel *ngIf="showFilterPanel" [fields]="filterFields" [model]="filterCriteria"
  (apply)="onFilterApply($event)" (reset)="onFilterReset()" (close)="onFilterClose()"
  (modelChange)="onFilterCriteriaChange($event)">
</app-unified-filter-panel>

<!-- Item Details Modal -->
<app-inventory-site-item-details-modal [visible]="showItemDetailsModal" [title]="itemDetailsTitle"
  [itemData]="selectedItemData" (close)="closeItemDetailsModal()">
</app-inventory-site-item-details-modal>
